  /send-email:
    post:
      tags:
        - Utility
      security: []
      summary: Send an email
      description: |
        Sends an email using the configured SMTP server.

        Supports:
        - Plain text body
        - Optional HTML body
        - CC and BCC recipients
        - File attachments (base64 encoded)

        If `html_body` is not provided, a default styled email template
        will be generated automatically.

      operationId: sendEmail

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - to
                - subject
                - body
              properties:

                to:
                  type: array
                  description: List of primary recipient email addresses
                  items:
                    type: string
                    format: email
                  example:
                    - user@example.com

                subject:
                  type: string
                  description: Email subject line
                  example: Order Created

                body:
                  type: string
                  description: Plain text email body
                  example: |
                    Your order ORD-1001 has been created successfully.

                sender:
                  type: string
                  format: email
                  description: Optional sender email address
                  example: noreply@cloudy.com

                cc:
                  type: array
                  description: Optional CC recipients
                  items:
                    type: string
                    format: email
                  example:
                    - manager@example.com

                bcc:
                  type: array
                  description: Optional BCC recipients
                  items:
                    type: string
                    format: email

                html_body:
                  type: string
                  description: Optional HTML formatted email body
                  example: |
                    <h2>Order Created</h2>
                    <p>Your order has been processed.</p>

                attachments:
                  type: array
                  description: |
                    Optional file attachments encoded in base64.
                  items:
                    type: object
                    required:
                      - filename
                      - data
                    properties:

                      filename:
                        type: string
                        example: invoice.pdf

                      data:
                        type: string
                        description: Base64 encoded file content
                        example: VGhpcyBpcyBhIHRlc3QgZmlsZQ==

      responses:

        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Email sent to user@example.com

        "400":
          description: Invalid JSON request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Request body must be valid JSON.

        "422":
          description: Validation error in request payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Missing required field 'to'.

        "500":
          description: Email sending failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Failed to send email.

  /v1/proxy:
    post:
      tags:
        - Utility
      security: []
      summary: Proxy external HTTP request
      description: |
        Forwards an HTTP request to an external API and returns the raw response. **Use in case CORS is deactivated for an API**

        ⚠️ Use with caution. This endpoint allows sending requests to arbitrary URLs.

        - Supports GET, POST, PUT, DELETE, etc.
        - Pass headers, query params, and body dynamically
        - Response is returned as-is (status + content-type preserved)

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProxyRequest'
            example:
              url: "https://api.example.com/data"
              method: "POST"
              headers:
                api-key: "<YOUR-TOKEN>"
              params:
                id: "sh23z4-ad4a-4a55-a292-f44b109fa9b2"
              body:
                key: "value"

      responses:
        "200":
          description: Successful proxied response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

        "400":
          description: Missing or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'

        "502":
          description: Could not connect to target URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyConnectionError'

        "504":
          description: External request timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyTimeoutError'

        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key

  schemas:

    CreateApiKeyRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "john_doe"
        password:
          type: string
          example: "password123"

    ApiKeyResponse:
      type: object
      properties:
        apikey:
          type: string
          example: "ubl_sk_b7c4c5e8a9d34f6c9b8e21d7a4f12345"

    Address:
      type: object
      properties:
        street:
          type: string
          example: "436 George St"
        city:
          type: string
          example: "Sydney"
        state:
          type: string
          example: "NSW"
        postal_code:
          type: string
          example: "2000"
        country_code:
          type: string
          example: "AU"

    TaxScheme:
      type: object
      properties:
        registration_name:
          type: string
          example: "Bridgtow District Council"
        company_id:
          type: string
          example: "12356478"
        exemption_reason:
          type: string
          example: "Local Authority"
        scheme_id:
          type: string
          example: "UK VAT"
        tax_type_code:
          type: string
          example: "VAT"

    Contact:
      type: object
      properties:
        name:
          type: string
          example: "Mr Fred Churchill"
        telephone:
          type: string
          example: "0127 2653214"
        telefax:
          type: string
          example: "0127 2653215"
        email:
          type: string
          example: "fred@iytcorporation.gov.uk"

    OrderItem:
      type: object
      properties:
        item_name:
          type: string
          example: "Widget"
        item_description:
          type: string
          example: "Industrial widget"
        quantity:
          type: integer
          example: 15
        unit_price:
          type: number
          example: 50.00
        unit_code:
          type: string
          example: "EA"
          description: Unit of measure code (defaults to EA if omitted)

    CreateBuyerRequest:
      type: object
      required:
        - customer_assigned_account_id
        - party_name
      properties:
        customer_assigned_account_id:
          type: string
          example: "XFB01"
        supplier_assigned_account_id:
          type: string
          example: "GT00978567"
        party_name:
          type: string
          example: "IYT Corporation"
        address:
          $ref: '#/components/schemas/Address'
        tax_scheme:
          $ref: '#/components/schemas/TaxScheme'
        contact:
          $ref: '#/components/schemas/Contact'

    CreateBuyerResponse:
      type: object
      properties:
        buyerId:
          type: string
          format: uuid
          example: "3f7a2c1e-4b5d-4e6f-9a8b-1c2d3e4f5a6b"
        message:
          type: string
          example: "Buyer created successfully"

    UpdateBuyerRequest:
      type: object
      properties:
        customer_assigned_account_id:
          type: string
          example: "XFB01"
        supplier_assigned_account_id:
          type: string
          example: "GT00978567"
