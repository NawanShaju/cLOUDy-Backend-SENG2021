openapi: 3.0.0

info:
  title: cLOUDy UBL Ordering
  version: 1.0.0
  description: |
    This is the UBL ordering API.

    🔐 Authentication  
    All endpoints except `/create-key` require an API key.

    To obtain an API key:
    1. Call **POST /create-key**
    2. Copy the returned key
    3. Send it in requests:

    api-key: YOUR_API_KEY

servers:
  - url: http://44.197.195.61:5001/v1

security:
  - ApiKeyAuth: []

tags:
  - name: Auth
    description: Operations for authentication
  - name: Orders
    description: Operations about the orders
  - name: Validation
    description: Operations for XML validation

paths:

  /create-key:
    post:
      tags:
        - Auth
      security: []
      summary: Generate API key
      description: Authenticate a user and generate an API key. If user already registered returns their key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'

      responses:
        "200":
          description: API key generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'

        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'

        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'


  /buyer/{buyerId}/order:

    post:
      tags:
        - Orders
      summary: Create order
      description: Creates an order for a buyer and returns the generated UBL XML.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'

      responses:
        "200":
          description: Order created successfully
          content:
            application/xml:
              schema:
                type: string
                example: "<order><id>123</id></order>"

        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'

        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'


    get:
      tags:
        - Orders
      summary: List orders for a buyer
      description: Retrieve a paginated list of orders for a buyer.
      parameters:

        - name: buyerId
          in: path
          required: true
          schema:
            type: string

        - name: status
          in: query
          required: false
          schema:
            type: string
            example: CREATED

        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-01"

        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-10"

        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10

        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0

      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'

        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'

        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'

        "404":
          description: Buyer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'


  /buyer/{buyerId}/order/{orderId}:

    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieve a specific order for a buyer.
      parameters:

        - name: buyerId
          in: path
          required: true
          schema:
            type: string

        - name: orderId
          in: path
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'

        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'


  /validate-xml:
    post:
      tags:
        - Validation
      security: []
      summary: Validate XML
      description: Validate an order XML document.

      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
              example: "<order><id>123</id></order>"

      responses:
        "200":
          description: XML validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XmlValidationResponse'

        "400":
          description: XML validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XmlValidationError'

        "500":
          description: Server error during validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'


components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api-key

  schemas:
    CreateApiKeyRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "john_doe"
        password:
          type: string
          example: "password123"

    ApiKeyResponse:
      type: object
      properties:
        apikey:
          type: string
          example: "b7c4c5e8a9d34f6c9b8e21d7a4f12345"

    OrderRequest:
      type: object
      required:
        - order_date
        - supplier
        - delivery_date
        - currency_code
        - address
        - items
      properties:
        order_date:
          type: string
          format: date
          example: "2026-03-07"

        supplier:
          type: string
          example: "cLOUDy"

        delivery_date:
          type: string
          format: date
          example: "2026-03-10"

        currency_code:
          type: string
          example: "AUD"

        address:
          $ref: '#/components/schemas/Address'

        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'

    Address:
      type: object
      required:
        - street
        - city
        - state
        - postal_code
        - country_code
      properties:
        street:
          type: string
          example: "123 Main St"

        city:
          type: string
          example: "Sydney"

        state:
          type: string
          example: "NSW"

        postal_code:
          type: string
          example: "2000"

        country_code:
          type: string
          example: "AU"

    Item:
      type: object
      required:
        - item_name
        - quantity
        - unit_price
      properties:
        item_name:
          type: string
          example: "Steel Bolt"
          
        item_description:
          type: string
          example: "High-strength steel bolt"

        quantity:
          type: integer
          example: 50

        unit_price:
          type: number
          format: float
          example: 1.5

    OrderResponse:
      type: object
      properties:
        orderId:
          type: string
          example: "123"

        productId:
          type: string
          nullable: true
          example: "456"

        quantity:
          type: integer
          example: 50

        money:
          type: number
          format: float
          example: 75.0

        status:
          type: string
          example: "CREATED"

        xml:
          type: string
          description: XML representation of the order
          example: "<order><id>123</id></order>"

    OrdersListResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
                    
        message:
          type: string
          example: "All orders for a buyer"

        buyerId:
          type: string
          example: "70f4810c-5904-454c-8b35-2876e01d9b08"

        count:
          type: integer
          example: 2

        limit:
          type: integer
          example: 10

        offset:
          type: integer
          example: 0

        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'

    OrderSummary:
      type: object
      properties:
        orderId:
          type: string
          example: "ca21f797-379a-4e27-a703-4992c5ea46fa"

        orderDate:
          type: string
          format: date
          example: "2026-03-07"

        deliveryDate:
          type: string
          format: date
          example: "2026-03-10"

        currencyCode:
          type: string
          example: "AUD"

        itemCount:
          type: integer
          example: 2

        totalAmount:
          type: string
          example: "150.00"

        status:
          type: string
          example: "CREATED"
          
    BadRequestError:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string

    NotFoundError:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string

    ServerError:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string

    InvalidApiKeyError:
      type: object
      properties:
        status:
          type: integer
          example: 401
        error:
          type: string
          example: "API key is missing or invalid"

    UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: "Invalid username or password"

    XmlValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
          example: true
        errors:
          type: array
          items:
            type: string
          example: []

    XmlValidationError:
      type: object
      properties:
        valid:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example:
            - "Missing required element: orderId"
            - "Invalid currency code"