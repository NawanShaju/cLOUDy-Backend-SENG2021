openapi: 3.0.0

info:
  title: cLOUDy UBL Ordering
  version: 1.0.0
  description: |
    This is the UBL ordering API.

    ### CORS
    CORS is enabled for cross-origin requests. This API uses API key authentication,
    so clients should not send credentials (e.g. cookies or withCredentials);
    include the api-key header only. Do not set withCredentials/Credentials to true.

    🔐 **Authentication**
    All endpoints except `/get-key`, `/health`, and `/v1/validate-xml` require an API key.

    To obtain an API key:
    1. Call **POST /get-key**
    2. Copy the returned key
    3. Send it in requests:

    `api-key: YOUR_API_KEY`

servers:
  - url: http://cloudy-1831309437.us-east-1.elb.amazonaws.com/api
    description: Production Server
  - url: http://0.0.0.0:5001/api
    description: Local Server

security:
  - ApiKeyAuth: []

tags:
  - name: System
    description: System health and monitoring
  - name: Auth
    description: Operations for authentication
  - name: Buyers
    description: Operations about buyers
  - name: Sellers
    description: Operations about sellers
  - name: Orders
    description: |
      Standard order operations (V1).

      **Note:** V1 order endpoints do not support registered buyer IDs or seller IDs.
      Buyer and seller details are taken directly from the request body fields
      (e.g. `address`, `supplier`). To create orders enriched with full registered
      buyer and seller details, use the **Orders V2** endpoints.
  - name: Orders V2
    description: |
      Enhanced order operations (V2).

      Requires the `buyerId` path parameter to be a UUID of a buyer registered
      via **POST /v1/buyer**. The generated UBL XML is automatically enriched
      with full buyer details (party name, postal address, tax scheme, contact).

      Optionally, a `seller_id` field can be included in the request body to link
      a registered seller (created via **POST /v1/seller**). When provided, the
      seller's full details are embedded in the UBL XML 
      
      `SellerSupplierParty` block. When omitted, the `supplier` field in the request body is used as a plain name fallback.
  - name: Products
    description: Operations for managing seller product catalogues
  - name: Cart
    description: |
      A staging area for sellers where the products that are staged for order creation can be viewed.

      Sellers can manage a cart of products and check out to automatically
      generate a UBL order for a registered buyer.
  - name: Utility
    description: Methods for extra functonality

paths:

  /health:
    get:
      tags:
        - System
      security: []
      summary: Health check
      description: Returns the health status of the API service.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "running"
        "500":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /get-key:
    post:
      tags:
        - Auth
      security: []
      summary: Generate or get API key
      description: Authenticate a user and generate an API key. If user already registered returns their key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        "200":
          description: API key generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'

  /v1/buyer:
    post:
      tags:
        - Buyers
      summary: Create buyer
      description: |
        Creates a new buyer with optional address, tax scheme, and contact details.

        The buyer_id returned can be passed as buyer_id in the **POST /v2/buyer/{buyerId}/order**
        to embed full buyer details in the generated UBL XML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuyerRequest'
            example:
              party_name: "IYT Corporation"
              customer_assigned_account_id: "XFB01"
              supplier_assigned_account_id: "GT00978567"
              address:
                street: "56A Avon Way"
                city: "Bridgtow"
                state: "Avon"
                postal_code: "ZZ99 1ZZ"
                country_code: "GB"
              contact:
                name: "Mr Fred Churchill"
                telephone: "0127 2653214"
                telefax: "0127 2653215"
                email: "fred@iytcorporation.gov.uk"
              tax_scheme:
                registration_name: "Bridgtow District Council"
                company_id: "12356478"
                exemption_reason: "Local Authority"
                scheme_id: "UK VAT"
                tax_type_code: "VAT"
      responses:
        "201":
          description: Buyer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBuyerResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
  /v1/buyers:
    get:
      tags:
        - Buyers
      summary: Get all buyers for API key
      description: |
        Returns all buyers associated with the provided API key.
      responses:
        "200":
          description: List of buyers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyersListResponse'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/buyer/{buyerId}:
    put:
      tags:
        - Buyers
      summary: Update buyer
      description: |
        Updates an existing buyer associated with the provided API key.

        Partial updates are supported. You may update one or more of the following:
        - party_name
        - customer_assigned_account_id
        - supplier_assigned_account_id
        - address
        - contact
        - tax_scheme
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBuyerRequest'
            example:
              party_name: "Updated Buyer Pty Ltd"
              supplier_assigned_account_id: "SUP-NEW-001"
              address:
                street: "20 George St"
                city: "Sydney"
                state: "NSW"
                postal_code: "2000"
                country_code: "AU"
              contact:
                name: "Updated Contact"
                telephone: "0400000000"
                telefax: "0299999999"
                email: "updated@buyer.com"
              tax_scheme:
                registration_name: "Updated Tax Name"
                company_id: "999999"
                exemption_reason: "None"
                scheme_id: "GST"
                tax_type_code: "GST"
      responses:
        "200":
          description: Buyer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBuyerResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "403":
          description: Not authorised to update this buyer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        "404":
          description: Buyer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerNotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

    delete:
      tags:
        - Buyers
      summary: Delete buyer
      description: |
        Deletes a buyer only if all related orders are hard deleted.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Buyer deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBuyerResponse'
        "400":
          description: Invalid buyerId format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "403":
          description: Not authorised to delete this buyer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        "404":
          description: Buyer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerNotFoundError'
        "409":
          description: Buyer has existing orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBuyerConflictError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/seller:
    post:
      tags:
        - Sellers
      summary: Create seller
      description: |
        Creates a new seller with optional address, tax scheme, and contact details.

        The seller_id returned can be passed as seller_id in the **POST /v2/buyer/{buyerId}/order**
        request body to embed full seller details in the generated UBL XML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSellerRequest'
            example:
              party_name: "Consortial Supplies"
              customer_assigned_account_id: "CO001"
              supplier_assigned_account_id: "SUP-98765"
              address:
                street: "56 Busy Street"
                city: "Farthing"
                state: "Heremouthshire"
                postal_code: "AA99 1BB"
                country_code: "AU"
              contact:
                name: "Mrs Bouquet"
                telephone: "0158 1233714"
                telefax: "0158 1233856"
                email: "bouquet@consortial.com"
              tax_scheme:
                registration_name: "Farthing Purchasing Consortium"
                company_id: "175 269 2355"
                exemption_reason: "N/A"
                scheme_id: "VAT"
                tax_type_code: "VAT"
      responses:
        "201":
          description: Seller created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSellerResponse'
        "400":
          description: Invalid request — missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
  /v1/sellers:
    get:
      tags:
        - Sellers
      summary: Get all sellers
      description: |
        Returns all sellers in the system.
      responses:
        "200":
          description: List of sellers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellersListResponse'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/seller/{sellerId}:
    put:
      tags:
        - Sellers
      summary: Update seller
      description: |
        Updates an existing seller.

        Partial updates are supported. You may update one or more of the following:
        - party_name
        - customer_assigned_account_id
        - supplier_assigned_account_id
        - address
        - contact
        - tax_scheme
      parameters:
        - name: sellerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSellerRequest'
            example:
              party_name: "Updated Seller Pty Ltd"
              supplier_assigned_account_id: "SUP-NEW-001"
              address:
                street: "20 George St"
                city: "Sydney"
                state: "NSW"
                postal_code: "2000"
                country_code: "AU"
              contact:
                name: "Updated Seller Contact"
                telephone: "0400000000"
                telefax: "0299999999"
                email: "updated@seller.com"
              tax_scheme:
                registration_name: "Updated Seller Tax Name"
                company_id: "999999"
                exemption_reason: "None"
                scheme_id: "GST"
                tax_type_code: "GST"
      responses:
        "200":
          description: Seller updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSellerResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Seller not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerNotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

    delete:
      tags:
        - Sellers
      summary: Delete seller
      description: |
        Deletes a seller only if all related orders are hard deleted.
      parameters:
        - name: sellerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Seller deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSellerResponse'
        "400":
          description: Invalid sellerId format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Seller not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerNotFoundError'
        "409":
          description: Seller has existing orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSellerConflictError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/buyer/{buyerId}/order:
    post:
      tags:
        - Orders
      summary: Create order (V1) [DEPRECATED]
      deprecated: true
      description: |
        ⚠️ **DEPRECATED: This endpoint will be removed in a future release.**

        Please use **POST /v2/buyer/{buyerId}/order** instead.

        Creates an order for a buyer and returns the generated UBL XML.

        **Note:** This V1 endpoint does not support registered buyer IDs or seller IDs.
        The `buyerId` path parameter is stored as an external reference only and is not
        validated against the buyers table. Buyer details in the XML are sourced from
        the `address` field in the request body. To include a named seller, provide a
        `supplier` string field — this will be used as the seller party name in the XML.
        For fully enriched buyer and seller XML, use **POST /v2/buyer/{buyerId}/order**.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
            example:
              order_date: "2026-02-27"
              delivery_date: "2026-03-10"
              currency_code: "AUD"
              supplier: "Acme Supplies"
              address:
                street: "436 George St"
                city: "Sydney"
                state: "NSW"
                postal_code: "2000"
                country_code: "AU"
              items:
                - item_name: "Widget"
                  item_description: "Industrial widget"
                  quantity: 15
                  unit_price: 50.00
      responses:
        "200":
          description: Order created successfully
          content:
            application/xml:
              schema:
                type: string
                example: "<Order>...</Order>"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

    get:
      tags:
        - Orders
      summary: List orders for a buyer
      description: |
        Retrieve a paginated list of orders for a buyer.

        **Note:** This endpoint uses the external `buyerId` reference, not a registered buyer UUID.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            example: CREATED
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-01"
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-10"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Buyer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/buyer/{buyerId}/order/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieve a specific order for a buyer.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        "400":
          description: Invalid orderId format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

    put:
      tags:
        - Orders
      summary: Update order
      description: |
        Update an existing order for a buyer and return the updated UBL XML document.

        **Note:** This V1 endpoint does not support seller IDs. Seller information in
        the XML is not updated by this endpoint.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateRequest'
            example:
              seller_id: "6ca72a7f-ad4a-4a55-a292-f44b109fa9b2"
              order_date: "2026-02-27"
              delivery_date: "2026-03-10"
              currency_code: "AUD"
              address:
                street: "436 George St"
                city: "Sydney"
                state: "NSW"
                postal_code: "2000"
                country_code: "AU"
              item:
                product_id: "2acd6acf-1d3d-405b-8177-eb110e46f712"
                item_name: "Widget"
                item_description: "Industrial widget"
                quantity: 15
                unit_price: 50
      responses:
        "200":
          description: Order updated successfully
          content:
            application/xml:
              schema:
                type: string
                example: "<Order>...</Order>"
        "400":
          description: Invalid request or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

    delete:
      tags:
        - Orders
      summary: Delete order
      description: Delete an existing order for the given buyer and orderId, only if the order status is already CANCELED.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteOrderResponse'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "403":
          description: Buyer does not have access to this order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        "409":
          description: Order cannot be deleted unless status is CANCELED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/buyer/{buyerId}/order/{orderId}/CANCELED:
    delete:
      tags:
        - Orders
      summary: Cancel order
      description: Cancel an existing order for the given buyer and orderId.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order canceled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "403":
          description: Buyer does not have access to this order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        "409":
          description: Order cannot be cancelled due to current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelConflictError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/buyer/{buyerId}/order/CANCELED:
    delete:
      tags:
        - Orders
      summary: Delete all cancelled orders for buyer
      description: Delete all orders with status CANCELED belonging to the given buyerId.
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All cancelled orders deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAllCancelledOrdersResponse'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Buyer not found or buyerId invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v2/buyer/{buyerId}/order:
    post:
      tags:
        - Orders V2
      summary: Create order (V2)
      description: |
        Creates an order for a registered buyer and returns enriched UBL XML.

        Unlike V1, the `buyerId` must correspond to a buyer registered via **POST /v1/buyer**.
        The generated XML is automatically populated with the buyer's full details including
        party name, postal address, tax scheme, and contact information.

        **Seller support:** An optional `seller_id` field can be included in the request body.
        When provided, it must be a valid UUID of a seller registered via **POST /v1/seller**.
        The seller's full details (party name, account IDs, address, tax scheme, contact) will
        be embedded in the `SellerSupplierParty` block of the generated UBL XML. When `seller_id`
        is omitted, the `supplier` string field is used as a plain seller name fallback.
      parameters:
        - name: buyerId
          in: path
          required: true
          description: UUID of a registered buyer (created via POST /v1/buyer)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestV2'
            example:
              order_date: "2024-01-15"
              delivery_date: "2024-01-20"
              currency_code: "AUD"
              seller_id: "6ca72a7f-ad4a-4a55-a292-f44b109fa9b2"
              address:
                street: "123 Main St"
                city: "Sydney"
                state: "NSW"
                postal_code: "2000"
                country_code: "AU"
              items:
                - item_name: "Widget A"
                  item_description: "A great widget"
                  unit_price: 10.00
                  quantity: 2
      responses:
        "200":
          description: Order created successfully — returns enriched UBL XML
          content:
            application/xml:
              schema:
                type: string
                example: "<Order>...</Order>"
        "400":
          description: Invalid request — bad UUID, missing fields, or invalid seller_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidApiKeyError'
        "404":
          description: Buyer not found or seller not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerNotFoundError'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

