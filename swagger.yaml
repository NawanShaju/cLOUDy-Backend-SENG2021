openapi: 3.0.0
info:
  title: Buyer Order API
  description: API for creating and retrieving buyer orders
  version: 1.0.0

servers:
  - url: http://localhost:5000

paths:
  /v1/buyer/{buyerId}/order:
    post:
      summary: Create a new order
      description: Creates an order for a buyer and returns generated XML.
      parameters:
        - name: buyerId
          in: path
          required: true
          description: Unique buyer identifier
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'

      responses:
        "200":
          description: Order created successfully
          content:
            application/xml:
              schema:
                type: string
                example: "<order><id>123</id></order>"

        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'
  
    get:
      summary: Get orders for a buyer
      description: Retrieve a paginated list of orders for a specific buyer with optional filtering.
      parameters:
        - name: buyerId
          in: path
          required: true
          description: Unique buyer identifier
          schema:
            type: string

        - name: status
          in: query
          required: false
          description: Filter orders by status
          schema:
            type: string
            example: CREATED

        - name: fromDate
          in: query
          required: false
          description: Filter orders from this date
          schema:
            type: string
            format: date
            example: "2026-03-01"

        - name: toDate
          in: query
          required: false
          description: Filter orders up to this date
          schema:
            type: string
            format: date
            example: "2026-03-10"

        - name: limit
          in: query
          required: false
          description: Maximum number of results returned
          schema:
            type: integer
            default: 10
            example: 10

        - name: offset
          in: query
          required: false
          description: Offset for pagination
          schema:
            type: integer
            default: 0
            example: 0

      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'

        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'

        "404":
          description: Buyer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

  /v1/buyer/{buyerId}/order/{orderId}:
    get:
      summary: Get order by ID
      description: Retrieve a specific order for a buyer.
      parameters:
        - name: buyerId
          in: path
          required: true
          description: Unique buyer identifier
          schema:
            type: string

        - name: orderId
          in: path
          required: true
          description: Unique order identifier
          schema:
            type: string

      responses:
        "200":
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

components:
  schemas:

    OrderRequest:
      type: object
      required:
        - order_date
        - supplier
        - delivery_date
        - currency_code
        - address
        - items
      properties:
        order_date:
          type: string
          format: date
          example: "2026-03-07"

        supplier:
          type: string
          example: "cLOUDy"

        delivery_date:
          type: string
          format: date
          example: "2026-03-10"

        currency_code:
          type: string
          example: "AUD"

        address:
          $ref: '#/components/schemas/Address'

        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'

    Address:
      type: object
      required:
        - street
        - city
        - state
        - postal_code
        - country_code
      properties:
        street:
          type: string
          example: "123 Main St"

        city:
          type: string
          example: "Sydney"

        state:
          type: string
          example: "NSW"

        postal_code:
          type: string
          example: "2000"

        country_code:
          type: string
          example: "AU"

    Item:
      type: object
      required:
        - item_name
        - quantity
        - unit_price
      properties:
        item_name:
          type: string
          example: "Steel Bolt"

        item_description:
          type: string
          example: "High-strength steel bolt"

        quantity:
          type: integer
          example: 50

        unit_price:
          type: number
          format: float
          example: 1.5

    OrderResponse:
      type: object
      properties:
        orderId:
          type: string
          example: "123"

        productId:
          type: string
          nullable: true
          example: "456"

        quantity:
          type: integer
          example: 50

        money:
          type: number
          format: float
          example: 75.0

        status:
          type: string
          example: "CREATED"

        xml:
          type: string
          description: XML representation of the order
          example: "<order><id>123</id></order>"

    BadRequestError:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Invalid Json Provided"

    NotFoundError:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: "Order couldnt be found"

    ServerError:
      type: object
      properties:
        status:
          type: integer
          example: 500
        error:
          type: string
          example: "Internal server error"

    OrdersListResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200

        message:
          type: string
          example: "All orders for a buyer"

        buyerId:
          type: string
          example: "70f4810c-5904-454c-8b35-2876e01d9b08"

        count:
          type: integer
          example: 2

        limit:
          type: integer
          example: 10

        offset:
          type: integer
          example: 0

        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'

    OrderSummary:
      type: object
      properties:
        orderId:
          type: string
          example: "ca21f797-379a-4e27-a703-4992c5ea46fa"

        orderDate:
          type: string
          format: date
          example: "2026-03-07"

        deliveryDate:
          type: string
          format: date
          example: "2026-03-10"

        currencyCode:
          type: string
          example: "AUD"

        itemCount:
          type: integer
          example: 2

        totalAmount:
          type: string
          example: "150.00"

        status:
          type: string
          example: "CREATED"